services:
  - type: web
    name: it-bm-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn bookshare.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: it-bm.onrender.com,.onrender.com,127.0.0.1,localhost
      - key: SQLITE_PATH
        value: /var/data/db.sqlite3
    disk:
      name: it-bm-data
      mountPath: /var/data
      sizeGB: 1

staticSites:
  - name: it-bm-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishPath: build
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
